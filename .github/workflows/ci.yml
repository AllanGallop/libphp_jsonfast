name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  linux-php83:
    name: Linux / PHP 8.3
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: none

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang libclang-dev pkg-config make

      - name: Configure libphp embed
        run: bash .github/scripts/configure-libphp-embed.sh

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install cargo-php
        env:
          RUSTFLAGS: -L ${{ env.LIBPHP_DIR }} -lphp
        run: |
          . "$HOME/.cargo/env"
          cargo install cargo-php --locked --version 0.1.18

      - name: Build
        run: |
          . "$HOME/.cargo/env"
          make build

      - name: Generate stubs
        run: |
          . "$HOME/.cargo/env"
          make stubs LIBPHP_DIR="${LIBPHP_DIR}" LIBPHP_SO="${LIBPHP_SO}"

      - name: Run tests
        run: |
          . "$HOME/.cargo/env"
          make test

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-jsonfast-linux-php83
          path: |
            target/release/libphp_jsonfast.so
            php_jsonfast.stub.php

  windows-php83:
    name: Windows / PHP 8.3
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: none

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Configure libclang
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files\LLVM\bin\libclang.dll") {
            echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          } elseif (Test-Path "C:\Program Files (x86)\LLVM\bin\libclang.dll") {
            echo "LIBCLANG_PATH=C:\Program Files (x86)\LLVM\bin" >> $env:GITHUB_ENV
          }

      - name: Build
        run: cargo build --release

      - name: Run tests
        shell: pwsh
        run: |
          $ext = Join-Path $env:GITHUB_WORKSPACE "target\release\php_jsonfast.dll"
          php -d "extension=$ext" tests/run_all.php

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-jsonfast-windows-php83
          path: target/release/php_jsonfast.dll
