name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  linux-php83:
    name: Linux / PHP 8.3
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: none

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang libclang-dev pkg-config make \
            libphp8.3-embed

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install cargo-php
        env:
          LIBRARY_PATH: /usr/lib
          LD_LIBRARY_PATH: /usr/lib
          RUSTFLAGS: -L /usr/lib -lphp
        run: |
          . "$HOME/.cargo/env"
          cargo install cargo-php --locked --version 0.1.10

      - name: Build
        run: |
          . "$HOME/.cargo/env"
          make build

      - name: Generate stubs
        env:
          LD_LIBRARY_PATH: /usr/lib
        run: |
          . "$HOME/.cargo/env"
          make stubs

      - name: Run tests
        run: |
          . "$HOME/.cargo/env"
          make test

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-jsonfast-linux-php83
          path: |
            target/release/libphp_jsonfast.so
            php_jsonfast.stub.php
