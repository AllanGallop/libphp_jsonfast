name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-linux-php83:
    name: Release Linux PHP 8.3
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: none

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang libclang-dev pkg-config make zip

      - name: Configure libphp embed
        run: bash .github/scripts/configure-libphp-embed.sh

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install cargo-php
        env:
          RUSTFLAGS: -L ${{ env.LIBPHP_DIR }} -lphp
        run: |
          . "$HOME/.cargo/env"
          cargo install cargo-php --locked --version 0.1.18

      - name: Build and test
        run: |
          . "$HOME/.cargo/env"
          make release LIBPHP_DIR="${LIBPHP_DIR}"

      - name: Package release
        run: |
          mkdir -p dist
          cp target/release/libphp_jsonfast.so dist/php_jsonfast-linux-x86_64-php83.so
          cp php_jsonfast.stub.php dist/
          cp README.md dist/ 2>/dev/null || cp ReadMe.md dist/ 2>/dev/null || true
          cd dist
          zip ../php_jsonfast-linux-x86_64-php83.zip *

      - name: Upload Linux release artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: php_jsonfast-linux-x86_64-php83.zip

  release-windows-php83:
    name: Release Windows PHP 8.3
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: none

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - name: Configure libclang
        shell: pwsh
        run: |
          if (Test-Path "C:\Program Files\LLVM\bin\libclang.dll") {
            echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV
          } elseif (Test-Path "C:\Program Files (x86)\LLVM\bin\libclang.dll") {
            echo "LIBCLANG_PATH=C:\Program Files (x86)\LLVM\bin" >> $env:GITHUB_ENV
          }

      - name: Build
        run: cargo build --release

      - name: Run tests
        shell: pwsh
        run: |
          $ext = Join-Path $env:GITHUB_WORKSPACE "target\release\php_jsonfast.dll"
          php -d "extension=$ext" tests/run_all.php

      - name: Package release
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/php_jsonfast.dll dist/php_jsonfast-windows-x86_64-php83.dll
          cp php_jsonfast.stub.php dist/ 2>/dev/null || true
          cp README.md dist/
          cd dist
          7z a ../php_jsonfast-windows-x86_64-php83.zip *

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: php_jsonfast-windows-x86_64-php83.zip

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [release-linux-php83, release-windows-php83]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true

  build-deb:
    name: Build Debian package
    runs-on: ubuntu-latest
    needs: release-linux-php83

    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: |
          docker compose -f packaging/docker/docker-compose.yml run --rm debian-bookworm

      - name: List built packages
        run: |
          ls -lah packaging/dist

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: packaging/dist/*.deb

      - name: Attach .deb to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/*.deb
